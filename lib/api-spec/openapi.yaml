openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: OCR Information Extraction API - Schema-anchored extraction pipeline
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: schemas
    description: Document schema management
  - name: extractions
    description: OCR document extraction operations
  - name: pdf-extractions
    description: Construction PDF ingestion pipeline
  - name: spec-extractions
    description: Construction specification document extraction pipeline
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /schemas:
    get:
      operationId: listSchemas
      tags: [schemas]
      summary: List document schemas
      description: Returns all defined extraction schemas
      responses:
        "200":
          description: List of schemas
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemas:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentSchema"
                required:
                  - schemas
    post:
      operationId: createSchema
      tags: [schemas]
      summary: Create a document schema
      description: Define a new extraction schema with fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchemaBody"
      responses:
        "201":
          description: Schema created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSchema"

  /schemas/{id}:
    get:
      operationId: getSchema
      tags: [schemas]
      summary: Get a document schema
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schema found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSchema"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteSchema
      tags: [schemas]
      summary: Delete a document schema
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schema deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /extractions:
    get:
      operationId: listExtractions
      tags: [extractions]
      summary: List all extractions
      description: Returns all past extraction results
      parameters:
        - name: schemaId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of extractions
          content:
            application/json:
              schema:
                type: object
                properties:
                  extractions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExtractionResult"
                required:
                  - extractions

  /extractions/{id}:
    get:
      operationId: getExtraction
      tags: [extractions]
      summary: Get an extraction result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /pdf-extractions:
    get:
      operationId: listPdfExtractions
      tags: [pdf-extractions]
      summary: List all construction PDF extractions
      responses:
        "200":
          description: List of PDF extractions
          content:
            application/json:
              schema:
                type: object
                properties:
                  extractions:
                    type: array
                    items:
                      $ref: "#/components/schemas/PdfExtractionSummary"
                required:
                  - extractions

  /pdf-extractions/{id}:
    get:
      operationId: getPdfExtraction
      tags: [pdf-extractions]
      summary: Get a construction PDF extraction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF extraction found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfExtractionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /spec-extractions:
    get:
      operationId: listSpecExtractions
      tags: [spec-extractions]
      summary: List all spec extractions
      responses:
        "200":
          description: List of spec extractions
          content:
            application/json:
              schema:
                type: object
                properties:
                  extractions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SpecExtractionSummary"
                required:
                  - extractions

  /spec-extractions/{id}:
    get:
      operationId: getSpecExtraction
      tags: [spec-extractions]
      summary: Get a spec extraction with full section data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spec extraction found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecExtractionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /extractions/{id}/raw-text:
    get:
      operationId: getExtractionRawText
      tags: [extractions]
      summary: Get raw OCR text for an extraction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Raw text
          content:
            application/json:
              schema:
                type: object
                properties:
                  rawText:
                    type: string
                required:
                  - rawText
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SchemaField:
      type: object
      properties:
        name:
          type: string
          description: Field identifier (snake_case)
        label:
          type: string
          description: Human-readable field label
        type:
          type: string
          enum: [string, number, date, boolean, array]
          description: Data type for this field
        description:
          type: string
          description: What this field represents and how to extract it
        required:
          type: boolean
          description: Whether this field must be present in every extraction
        example:
          type: string
          description: Example value for this field
      required:
        - name
        - label
        - type
        - description
        - required

    DocumentSchema:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Schema name (e.g. "Receipt", "Invoice")
        description:
          type: string
          description: What type of document this schema is for
        fields:
          type: array
          items:
            $ref: "#/components/schemas/SchemaField"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - fields
        - createdAt
        - updatedAt

    CreateSchemaBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/SchemaField"
      required:
        - name
        - description
        - fields

    ExtractedField:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        value:
          description: Extracted value (null if not found)
        confidence:
          type: number
          description: Confidence score 0-1
        present:
          type: boolean
          description: Whether the field was found in the document
      required:
        - name
        - label
        - confidence
        - present

    SpecSubsection:
      type: object
      properties:
        identifier:
          type: string
        title:
          type: string
          nullable: true
        content:
          type: string
      required:
        - identifier
        - content

    SpecPart:
      type: object
      properties:
        name:
          type: string
        subsections:
          type: array
          items:
            $ref: "#/components/schemas/SpecSubsection"
      required:
        - name
        - subsections

    SpecSection:
      type: object
      properties:
        section_number:
          type: string
        section_title:
          type: string
        division_number:
          type: string
        division_title:
          type: string
        page_start:
          type: integer
        page_end:
          type: integer
        parts:
          type: array
          items:
            $ref: "#/components/schemas/SpecPart"
        full_text:
          type: string
      required:
        - section_number
        - section_title
        - division_number
        - division_title
        - page_start
        - page_end
        - parts
        - full_text

    SpecExtractionSummary:
      type: object
      properties:
        id:
          type: integer
        fileName:
          type: string
        status:
          type: string
          enum: [processing, completed, failed]
        totalPages:
          type: integer
        projectName:
          type: string
          nullable: true
        processingTimeMs:
          type: integer
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - fileName
        - status
        - totalPages
        - processingTimeMs
        - createdAt
        - updatedAt

    SpecExtractionDetail:
      type: object
      properties:
        id:
          type: integer
        fileName:
          type: string
        status:
          type: string
          enum: [processing, completed, failed]
        totalPages:
          type: integer
        projectName:
          type: string
          nullable: true
        processingTimeMs:
          type: integer
        errorMessage:
          type: string
          nullable: true
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SpecSection"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - fileName
        - status
        - totalPages
        - sections
        - processingTimeMs
        - createdAt
        - updatedAt

    ConstructionTitleBlock:
      type: object
      properties:
        project_name:
          type: string
          nullable: true
        drawing_title:
          type: string
          nullable: true
        sheet_number:
          type: string
          nullable: true
        revision:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
        drawn_by:
          type: string
          nullable: true
        scale:
          type: string
          nullable: true
        confidence:
          type: number
      required:
        - confidence

    ConstructionRevision:
      type: object
      properties:
        rev_number:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    ConstructionCallout:
      type: object
      properties:
        text:
          type: string
        type:
          type: string
      required:
        - text
        - type

    ConstructionLegend:
      type: object
      properties:
        symbol:
          type: string
        description:
          type: string
      required:
        - symbol
        - description

    ConstructionPageResult:
      type: object
      properties:
        page_number:
          type: integer
        extraction_method:
          type: string
        title_block:
          $ref: "#/components/schemas/ConstructionTitleBlock"
        revision_history:
          type: array
          items:
            $ref: "#/components/schemas/ConstructionRevision"
        general_notes:
          type: array
          items:
            type: string
        callouts:
          type: array
          items:
            $ref: "#/components/schemas/ConstructionCallout"
        legends:
          type: array
          items:
            $ref: "#/components/schemas/ConstructionLegend"
        all_text:
          type: string
        ocr_confidence:
          type: number
      required:
        - page_number
        - extraction_method
        - title_block
        - revision_history
        - general_notes
        - callouts
        - legends
        - all_text
        - ocr_confidence

    PdfExtractionSummary:
      type: object
      properties:
        id:
          type: integer
        fileName:
          type: string
        status:
          type: string
          enum: [processing, completed, failed]
        totalPages:
          type: integer
        processedPages:
          type: integer
        processingTimeMs:
          type: integer
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - fileName
        - status
        - totalPages
        - processedPages
        - processingTimeMs
        - createdAt
        - updatedAt

    PdfExtractionDetail:
      type: object
      properties:
        id:
          type: integer
        fileName:
          type: string
        status:
          type: string
          enum: [processing, completed, failed]
        totalPages:
          type: integer
        processedPages:
          type: integer
        processingTimeMs:
          type: integer
        errorMessage:
          type: string
          nullable: true
        pages:
          type: array
          items:
            $ref: "#/components/schemas/ConstructionPageResult"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - fileName
        - status
        - totalPages
        - processedPages
        - processingTimeMs
        - pages
        - createdAt
        - updatedAt

    ExtractionResult:
      type: object
      properties:
        id:
          type: integer
        schemaId:
          type: integer
        schemaName:
          type: string
        fileName:
          type: string
        fileType:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedField"
        overallConfidence:
          type: number
          description: Average confidence across all fields
        processingTimeMs:
          type: integer
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - schemaId
        - schemaName
        - fileName
        - fileType
        - status
        - fields
        - overallConfidence
        - processingTimeMs
        - createdAt
        - updatedAt
